<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - MediConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .navbar-brand i {
            margin-right: 8px;
        }

        #alert-container {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            max-width: 500px;
        }

        .alert-floating {
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .card {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: none;
        }

        .card-body {
            padding: 3rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .register-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .register-icon i {
            font-size: 40px;
            color: white;
        }

        .form-label {
            font-weight: 500;
            color: #495057;
        }

        .form-label i {
            color: #667eea;
            margin-right: 5px;
        }

        .required-field::after {
            content: " *";
            color: #dc3545;
        }

        @media (max-width: 768px) {
            .card-body {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-heartbeat"></i> MediConnect
            </a>
        </div>
    </nav>

    <div id="alert-container"></div>

    <div class="container">
        <div class="row justify-content-center mt-4 mb-5">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow">
                    <div class="card-body">
                        <div class="register-icon">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <h3 class="text-center mb-3 fw-bold">Create Your Account</h3>
                        <p class="text-center text-muted mb-4">Join MediConnect to search for doctors and medicines</p>
                        
                        <form id="registerForm">
                            <div class="row">
                                <!-- Full Name -->
                                <div class="col-md-6 mb-3">
                                    <label for="full_name" class="form-label required-field">
                                        <i class="fas fa-user"></i>Full Name
                                    </label>
                                    <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Enter your full name" required>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label required-field">
                                        <i class="fas fa-envelope"></i>Email Address
                                    </label>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                                </div>

                                <!-- Password -->
                                <div class="col-md-6 mb-3">
                                    <label for="password" class="form-label required-field">
                                        <i class="fas fa-lock"></i>Password
                                    </label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Minimum 6 characters" required minlength="6">
                                    <small class="form-text text-muted">At least 6 characters</small>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label required-field">
                                        <i class="fas fa-phone"></i>Phone Number
                                    </label>
                                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter phone number" pattern="[0-9]{10}">
                                    <small class="form-text text-muted">10 digit mobile number</small>
                                </div>

                                <!-- Date of Birth -->
                                <div class="col-md-6 mb-3">
                                    <label for="date_of_birth" class="form-label">
                                        <i class="fas fa-calendar"></i>Date of Birth
                                    </label>
                                    <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" placeholder="Enter your DoB">
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6 mb-3">
                                    <label for="gender" class="form-label">
                                        <i class="fas fa-venus-mars"></i>Gender
                                    </label>
                                    <select class="form-select" id="gender" aria-label="gender" name="gender" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                <!-- Address -->
                                <div class="col-12 mb-3">
                                    <label for="address" class="form-label">
                                        <i class="fas fa-home"></i>Address
                                    </label>
                                    <textarea class="form-control" id="address" name="address" rows="2" placeholder="Enter your complete address"></textarea>
                                </div>

                                <!-- City -->
                                <div class="col-md-4 mb-3">
                                    <label for="city" class="form-label">
                                        <i class="fas fa-city"></i>City
                                    </label>
                                    <input type="text" class="form-control" id="city" name="city" placeholder="Enter city">
                                </div>

                                <!-- State -->
                                <div class="col-md-4 mb-3">
                                    <label for="state" class="form-label">
                                        <i class="fas fa-map"></i>State
                                    </label>
                                    <input type="text" class="form-control" id="state" name="state" placeholder="Enter state">
                                </div>

                                <!-- Pincode -->
                                <div class="col-md-4 mb-3">
                                    <label for="pincode" class="form-label">
                                        <i class="fas fa-map-pin"></i>Pincode
                                    </label>
                                    <input type="text" class="form-control" id="pincode" name="pincode" placeholder="Enter pincode" pattern="[0-9]{6}">
                                    <small class="form-text text-muted">6 digits</small>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary btn-lg w-100">
                                    <i class="fas fa-user-plus me-2"></i>Create Account
                                </button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="mb-2">Already have an account? <a href="/user-login" class="fw-bold text-decoration-none">Login here</a></p>
                            <a href="/" class="text-muted text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i>Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // API Configuration
        const API_URL = 'http://localhost:5000/';

        // Show Alert Function
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alert-container');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show alert-floating`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alertDiv);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Email validation
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Phone validation
        function validatePhone(phone) {
            if (!phone) return true; // Optional field
            const re = /^[0-9]{10}$/;
            return re.test(phone);
        }

        // Pincode validation
        function validatePincode(pincode) {
            if (!pincode) return true; // Optional field
            const re = /^[0-9]{6}$/;
            return re.test(pincode);
        }

        // Register Form Submit Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            //let registerForm = document.getElementById('registerForm');
            //let formData = new FormData(registerForm);
            //let data = Object.fromEntries(formData);
            
            // Get form values
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;
            const pincode = document.getElementById('pincode').value;

            // Validation
            if (!validateEmail(email)) {
                showAlert('Please enter a valid email address', 'warning');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters long', 'warning');
                return;
            }

            if (phone && !validatePhone(phone)) {
                showAlert('Phone number must be 10 digits', 'warning');
                return;
            }

            if (pincode && !validatePincode(pincode)) {
                showAlert('Pincode must be 6 digits', 'warning');
                return;
            }

            // Prepare form data
            const formData = {
                full_name: document.getElementById('full_name').value,
                email: email,
                password: password,
                phone: phone,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: pincode,
                date_of_birth: document.getElementById('date_of_birth').value,
                gender: document.getElementById('gender').value
            };

            // Disable submit button to prevent double submission
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';

            try {
                const response = await fetch(`${API_URL}api/users/register`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Registration successful! Redirecting to login page...', 'success');
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/user-login';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registration failed. Please try again.', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Unable to connect to server. Please try again later.', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const userType = localStorage.getItem('userType');
            
            if (token && userType === 'user') {
                showAlert('You are already registered and logged in. Redirecting...', 'info');
                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 1500);
            }
        });

        // Set max date for date of birth (user must be at least 13 years old)
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const maxDate = new Date(today.getFullYear() - 13, today.getMonth(), today.getDate());
            const maxDateString = maxDate.toISOString().split('T')[0];
            document.getElementById('date_of_birth').setAttribute('max', maxDateString);
        });
    </script>
</body>
</html>
